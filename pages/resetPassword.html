<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Fitly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>


  <div class="hero-grid-bg" style="position:fixed; inset:0; pointer-events:none;"></div>
  <div
    style="position:fixed; width:500px; height:500px; background: radial-gradient(circle, rgba(0,207,255,0.06) 0%, transparent 70%); top:-100px; left:-100px; pointer-events:none;">
  </div>


  <nav style="padding: 1.25rem 0; border-bottom: 1px solid var(--border); position: relative; z-index: 10;">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="../index.html"
        style="font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none;">Fit<span
          style="color: var(--white);">ly</span></a>
      <span style="font-size: 0.875rem; color: var(--text-muted);">Remembered? <a href="login.html"
          style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign in</a></span>
    </div>
  </nav>

  <!-- AUTHENTICATION FORM -->
  <div class="auth-wrapper" style="position: relative; z-index: 10;">
    <div class="auth-card">
      <div class="auth-logo">Reset Password</div>
      <p class="auth-tagline">Enter your email to reset your account password</p>

      <!-- Dynamic alert container -->
      <div id="resetAlert" style="display:none;" class="alert-custom warning mb-3">
        <i class="bi bi-exclamation-circle me-2"></i><span id="resetAlertMsg"></span>
      </div>

      <!-- STEP 1: FIND EMAIL -->
      <form id="findEmailForm">
        <div class="mb-4">
          <label class="form-label-custom">Email Address</label>
          <input type="email" id="resetEmail" class="form-control-custom" placeholder="you@example.com" required />
          <div class="field-error" style="display:none; font-size:0.75rem; color:var(--danger); margin-top:4px;">Account
            not found.</div>
        </div>

        <button type="submit" class="btn-primary-custom w-100" style="padding: 12px; font-size: 0.95rem;">
          Verify Email <i class="bi bi-chevron-right ms-2"></i>
        </button>
      </form>

      <!-- STEP 2: SET NEW PASSWORD (Hidden initially) -->
      <form id="newPasswordForm" style="display:none;">
        <div class="mb-3">
          <p
            style="font-size: 0.875rem; color: var(--text-secondary); background: rgba(0,207,255,0.05); padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary);">
            Email verified: <strong id="verifiedEmail"></strong>
          </p>
        </div>

        <div class="mb-4">
          <label class="form-label-custom">New Password</label>
          <div style="position: relative;">
            <input type="password" id="newPassword" class="form-control-custom" placeholder="••••••••" required
              style="padding-right: 40px;" />
            <button type="button" onclick="togglePass('newPassword', 'toggleIcon1')"
              style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:0;">
              <i class="bi bi-eye" id="toggleIcon1" style="font-size: 1rem;"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label-custom">Confirm New Password</label>
          <input type="password" id="confirmPassword" class="form-control-custom" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-primary-custom w-100" style="padding: 12px; font-size: 0.95rem;">
          Update Password <i class="bi bi-check2-circle ms-2"></i>
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
        <a href="login.html" style="color: var(--text-muted); text-decoration: none;"><i
            class="bi bi-arrow-left me-1"></i> Back to Login</a>
      </p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer" style="margin-top: 2rem; position: relative; z-index: 10;">
    <div class="container">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div class="footer-brand">Fitly</div>
        <span style="color: var(--text-muted);">&copy; 2026 Fitly. WIF2003 Group Project.</span>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>

  <script>
    function togglePass(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const findEmailForm = document.getElementById('findEmailForm');
      const newPasswordForm = document.getElementById('newPasswordForm');
      const alertBox = document.getElementById('resetAlert');
      const alertMsg = document.getElementById('resetAlertMsg');

      let targetUser = null;

      // STEP 1: FIND EMAIL
      findEmailForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        const users = Store.get('users');

        targetUser = users.find(u => u.email === email);

        if (!targetUser) {
          alertBox.style.display = 'block';
          alertMsg.textContent = 'No account found with this email address.';
          return;
        }

        // Found user - switch forms
        alertBox.style.display = 'none';
        findEmailForm.style.display = 'none';
        newPasswordForm.style.display = 'block';
        document.getElementById('verifiedEmail').textContent = email;
        document.querySelector('.auth-tagline').textContent = 'Please enter your new password below';
      });

      // STEP 2: UPDATE PASSWORD
      newPasswordForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        if (newPass.length < 6) {
          alertBox.style.display = 'block';
          alertMsg.textContent = 'Password must be at least 6 characters.';
          return;
        }

        if (newPass !== confirmPass) {
          alertBox.style.display = 'block';
          alertMsg.textContent = 'Passwords do not match.';
          return;
        }

        // Update in Store
        const users = Store.get('users');
        const userIndex = users.findIndex(u => u.email === targetUser.email);

        if (userIndex !== -1) {
          users[userIndex].password = newPass;
          Store.set('users', users);

          // Also update profile password if stored separately or shared
          // In this app, it seems 'users' is the main source of truth for auth

          alertBox.className = 'alert-custom success mb-3'; // Change to success style
          alertBox.style.display = 'block';
          alertBox.innerHTML = '<i class="bi bi-check-circle me-2"></i> Password updated successfully! Redirecting...';
          newPasswordForm.style.display = 'none';

          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        }
      });
    });
  </script>
</body>

</html>
