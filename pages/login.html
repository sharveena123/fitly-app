<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Fitly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="hero-grid-bg" style="position:fixed;inset:0;pointer-events:none;"></div>

  <nav style="padding:1.25rem 0;border-bottom:1px solid var(--border);position:relative;z-index:10;">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="../index.html" style="font-family:'Poppins',sans-serif;font-size:1.4rem;font-weight:800;color:var(--primary);text-decoration:none;">Fit<span style="color:var(--white);">ly</span></a>
      <span style="font-size:0.875rem;color:var(--text-muted);">Don't have an account? <a href="register.html" style="color:var(--primary);text-decoration:none;font-weight:500;">Sign up</a></span>
    </div>
  </nav>

  <div class="auth-wrapper" style="position:relative;z-index:10;">
    <div class="auth-card">
      <div class="auth-logo">Welcome back</div>
      <p class="auth-tagline">Sign in to continue tracking your fitness journey</p>

      <div id="loginAlert" style="display:none;" class="alert-custom warning mb-3">
        <i class="bi bi-exclamation-circle me-2"></i><span id="loginAlertMsg"></span>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label-custom">Email Address</label>
          <input type="email" id="loginEmail" class="form-control-custom" placeholder="you@example.com" required />
          <div class="field-error" style="display:none;font-size:0.75rem;color:var(--danger);margin-top:4px;">Please enter a valid email.</div>
        </div>

        <div class="mb-4">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <label class="form-label-custom" style="margin-bottom:0;">Password</label>
            <a href="resetPassword.html" style="font-size:0.8rem;color:var(--primary);text-decoration:none;">Forgot password?</a>
          </div>
          <div style="position:relative;">
            <input type="password" id="loginPassword" class="form-control-custom" placeholder="••••••••" required style="padding-right:40px;" />
            <button type="button" onclick="togglePass('loginPassword','toggleIcon1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;">
              <i class="bi bi-eye" id="toggleIcon1" style="font-size:1rem;"></i>
            </button>
          </div>
          <div class="field-error" style="display:none;font-size:0.75rem;color:var(--danger);margin-top:4px;">Please enter your password.</div>
        </div>

        <div class="mb-4 d-flex align-items-center gap-2">
          <input type="checkbox" id="rememberMe" style="accent-color:var(--primary);width:16px;height:16px;" />
          <label for="rememberMe" style="font-size:0.875rem;color:var(--text-secondary);cursor:pointer;">Remember me</label>
        </div>

        <button type="submit" class="btn-primary-custom w-100" style="padding:12px;font-size:0.95rem;">
          Sign In <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:1.5rem 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:0.75rem;color:var(--text-muted);">OR</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <button type="button" onclick="loginDemoUser()" class="btn-primary-custom w-100" style="padding:12px;font-size:0.95rem;">
        <i class="bi bi-play-fill me-2"></i> Continue as Demo User
      </button>

      <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-muted);">
        New to Fitly? <a href="register.html" style="color:var(--primary);text-decoration:none;font-weight:500;">Create an account</a>
      </p>
    </div>
  </div>

  <footer class="footer" style="margin-top:2rem;position:relative;z-index:10;">
    <div class="container">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div class="footer-brand">Fitly</div>
        <span style="color:var(--text-muted);">&copy; 2026 Fitly. WIF2003 Group Project.</span>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>

    function togglePass(inputId, iconId) {
      var inp  = document.getElementById(inputId);
      var icon = document.getElementById(iconId);
      if (inp.type === 'password') { inp.type = 'text';     icon.className = 'bi bi-eye-slash'; }
      else                         { inp.type = 'password'; icon.className = 'bi bi-eye'; }
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    document.addEventListener('DOMContentLoaded', function () {

      // ── Redirect if already logged in ──────────────────────────
      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
        return;
      }

      // ── Pre-fill remembered email ───────────────────────────────
      var rememberToken = localStorage.getItem('fitly_remember_token');
      if (rememberToken) {
        document.getElementById('loginEmail').value = rememberToken;
      }

      // ── Login form submit ───────────────────────────────────────
      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        var email      = document.getElementById('loginEmail').value.trim();
        var password   = document.getElementById('loginPassword').value;
        var rememberMe = document.getElementById('rememberMe').checked;

        // client-side validation
        var emailError = document.querySelector('#loginEmail').closest('.mb-3').querySelector('.field-error');
        var passError  = document.querySelector('#loginPassword').closest('.mb-4').querySelector('.field-error');
        var valid = true;

        if (!email || !validateEmail(email)) { emailError.style.display = 'block'; valid = false; }
        else emailError.style.display = 'none';

        if (!password || password.length < 3) {
          passError.style.display = 'block';
          passError.textContent   = password.length < 3 ? 'Password must be at least 3 characters.' : 'Please enter your password.';
          valid = false;
        } else passError.style.display = 'none';

        if (!valid) return;

        var alertBox = document.getElementById('loginAlert');
        var alertMsg = document.getElementById('loginAlertMsg');

        try {
          var response = await fetch('http://localhost:3000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          var result = await response.json();

          if (!result.success) {
            alertBox.style.display = 'block';
            alertMsg.textContent   = result.message;
            document.getElementById('loginPassword').value = '';
            return;
          }

          alertBox.style.display = 'none';

          // ── ✅ Save token ──────────────────────────────────────
          localStorage.setItem('token', result.token);

          // ── ✅ Save full profile (including MongoDB _id as 'id')
          //    so every page can call getCurrentUserId()
          var profileObj = {
            id:     result.user.id,        // MongoDB _id — used by workout/nutrition/goals pages
            name:   result.user.name,
            email:  result.user.email,
            age:    result.user.age,
            weight: result.user.weight,
            height: result.user.height,
            goal:   result.user.goal,
            photo:  ''
          };

          Store.setObj('profile',      profileObj);
          Store.setObj('currentUser',  { email: result.user.email, id: result.user.id });

          if (rememberMe) localStorage.setItem('fitly_remember_token', email);
          else            localStorage.removeItem('fitly_remember_token');

          showToast('Login successful! Redirecting...', 'success');
          setTimeout(function () { window.location.href = 'dashboard.html'; }, 800);

        } catch (err) {
          alertBox.style.display = 'block';
          alertMsg.textContent   = 'Server connection failed. Is your backend server running?';
        }
      });

      // ── Real-time field validation ──────────────────────────────
      document.getElementById('loginEmail').addEventListener('input', function () {
        if (this.value.trim() && validateEmail(this.value.trim())) {
          this.closest('.mb-3').querySelector('.field-error').style.display = 'none';
        }
        document.getElementById('loginAlert').style.display = 'none';
      });

      document.getElementById('loginPassword').addEventListener('input', function () {
        if (this.value && this.value.length >= 3) {
          this.closest('.mb-4').querySelector('.field-error').style.display = 'none';
        }
        document.getElementById('loginAlert').style.display = 'none';
      });
    });

    window.togglePass = togglePass;
  </script>
</body>
</html>
